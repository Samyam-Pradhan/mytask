<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyTask</title>
  <link rel="stylesheet" href="static/style.css"/>
</head>
<body>

<div class="box">

  <h1>📝 My Task</h1>

  <form action="/add" method="POST">
    <input type="text" name="title" placeholder="Add a task..." required>
    <button>Add</button>
  </form>

  <p class="count">{{ tasks|length }} tasks</p>

  {% for task in tasks %}
  <div class="task {% if task.completed %}done{% endif %}">
    <span>{{ task.title }}</span>
    <div>
      <a href="/toggle/{{ task.id }}">✓</a>
      <a href="/delete/{{ task.id }}">🗑</a>
    </div>
  </div>
  {% endfor %}

  {% if tasks|length == 0 %}
    <p class="empty">No tasks yet</p>
  {% endif %}

</div>

</body>
</html>
